# =============================================================================
# Prometheus — LOAD-TESTING-SPECIFIC Settings
# =============================================================================
# These settings are specific to the load-testing workflow.
# They configure:
#   - Remote-write receiver endpoint (k6 pushes metrics here)
#   - Scrape configs for k6-related metrics
#
# These settings are merged into the prometheus sub-chart values in values.yaml.
# This file exists as a REFERENCE to clearly document what is load-testing-
# specific vs what is common/platform configuration.
# =============================================================================

prometheus:
  server:
    # -- Remote-write receiver: k6 pushes metrics to this endpoint.
    #    The flag --web.enable-remote-write-receiver (set in common config)
    #    enables the /api/v1/write endpoint on the Prometheus server.
    #
    #    k6 connects to:
    #      http://<release>-prometheus-server.<namespace>.svc.cluster.local:80/api/v1/write
    #
    #    No additional scrape config is needed for k6 remote-write metrics —
    #    they are written directly into Prometheus TSDB.
    remoteWrite: []

  # -- Scrape configs for load-testing-related targets.
  #    The k6-metrics job is a placeholder for any additional scrape targets
  #    you want to correlate with load test results (e.g., application metrics
  #    endpoints exposed during tests).
  serverFiles:
    prometheus.yml:
      scrape_configs:
        - job_name: k6-metrics
          scrape_interval: 5s
          static_configs:
            - targets: []
              labels:
                source: k6
        # Pod-based service discovery: scrapes any pod with prometheus.io/scrape=true.
        # This adds namespace, pod, and node labels automatically, which the
        # EKS Application dashboard requires for its template variables.
        - job_name: kubernetes-pods
          scrape_interval: 5s
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: "true"
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
              action: replace
              target_label: __metrics_path__
              regex: (.+)
            - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
              action: replace
              regex: ([^:]+)(?::\d+)?;(\d+)
              replacement: $1:$2
              target_label: __address__
            - source_labels: [__meta_kubernetes_namespace]
              action: replace
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              action: replace
              target_label: pod
            - source_labels: [__meta_kubernetes_pod_node_name]
              action: replace
              target_label: node
        # Add application scrape targets to correlate with load tests:
        # - job_name: my-service-metrics
        #   scrape_interval: 15s
        #   static_configs:
        #     - targets:
        #         - my-service.default.svc.cluster.local:8080
        #       labels:
        #         service: my-service
