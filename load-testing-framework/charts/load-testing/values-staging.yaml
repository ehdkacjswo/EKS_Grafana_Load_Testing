# =============================================================================
# Staging Environment Overrides
# =============================================================================
# Usage: helm install load-testing ./load-testing-framework/charts/load-testing \
#          -f load-testing-framework/charts/load-testing/values.yaml \
#          -f load-testing-framework/charts/load-testing/values-staging.yaml
# =============================================================================

# -- Target services for staging
targets:
  default:
    baseUrl: "http://echo-server.load-testing.svc.cluster.local"

# -- k6 defaults tuned for staging (lower resource usage)
k6:
  defaults:
    parallelism: 1
    separate: false

# -- Prometheus: staging 설정 (PVC 크기는 축소 불가하므로 base와 동일하게 유지)
prometheus:
  server:
    retention: "7d"
    persistentVolume:
      size: 20Gi
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi
  # Enable kube-state-metrics and node-exporter for EKS dashboards
  kube-state-metrics:
    enabled: true
  prometheus-node-exporter:
    enabled: true
  # Add scrape configs for kube-state-metrics and node-exporter
  serverFiles:
    prometheus.yml:
      scrape_configs:
        - job_name: k6-metrics
          scrape_interval: 5s
          static_configs:
            - targets: []
              labels:
                source: k6
        - job_name: echo-server
          scrape_interval: 5s
          static_configs:
            - targets:
                - "echo-server.load-testing.svc.cluster.local:80"
              labels:
                source: echo-server
        - job_name: kube-state-metrics
          scrape_interval: 15s
          static_configs:
            - targets:
                - "load-testing-prometheus-kube-state-metrics.load-testing.svc.cluster.local:8080"
        - job_name: node-exporter
          scrape_interval: 15s
          static_configs:
            - targets:
                - "load-testing-prometheus-node-exporter.load-testing.svc.cluster.local:9100"

# -- Grafana: staging 설정 (PVC 크기는 축소 불가하므로 base와 동일하게 유지)
grafana:
  persistence:
    size: 5Gi
  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
