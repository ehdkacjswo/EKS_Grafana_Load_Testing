# =============================================================================
# Staging Environment Overrides
# =============================================================================
# Usage: helm install load-testing ./load-testing-framework/charts/load-testing \
#          -f load-testing-framework/charts/load-testing/values.yaml \
#          -f load-testing-framework/charts/load-testing/values-staging.yaml
# =============================================================================

# -- Target services for staging
targets:
  default:
    baseUrl: "http://echo-server.load-testing.svc.cluster.local"

# -- k6 defaults tuned for staging (lower resource usage)
k6:
  defaults:
    parallelism: 1
    separate: false

# -- Prometheus: staging 설정 (PVC 크기는 축소 불가하므로 base와 동일하게 유지)
prometheus:
  server:
    retention: "7d"
    persistentVolume:
      size: 20Gi
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi

# -- Grafana: staging 설정 (PVC 크기는 축소 불가하므로 base와 동일하게 유지)
grafana:
  persistence:
    size: 5Gi
  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
