# =============================================================================
# Staging Environment Overrides
# =============================================================================
# Usage: helm install load-testing ./load-testing-framework/charts/load-testing \
#          -f load-testing-framework/charts/load-testing/values.yaml \
#          -f load-testing-framework/charts/load-testing/values-staging.yaml
# =============================================================================

# -- Target services for staging
targets:
  default:
    baseUrl: "http://echo-server.load-testing.svc.cluster.local"

# -- k6 defaults tuned for staging (lower resource usage)
k6:
  defaults:
    parallelism: 1
    separate: false

# -- Prometheus: staging 설정 (PVC 크기는 축소 불가하므로 base와 동일하게 유지)
prometheus:
  server:
    retention: "7d"
    persistentVolume:
      size: 20Gi
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi
  # Enable kube-state-metrics and node-exporter for EKS dashboards
  kube-state-metrics:
    enabled: true
  prometheus-node-exporter:
    enabled: true
  # Add scrape configs for kube-state-metrics and node-exporter
  serverFiles:
    prometheus.yml:
      scrape_configs:
        - job_name: k6-metrics
          scrape_interval: 5s
          static_configs:
            - targets: []
              labels:
                source: k6
        - job_name: kubernetes-pods
          scrape_interval: 5s
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: "true"
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
              action: replace
              target_label: __metrics_path__
              regex: (.+)
            - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
              action: replace
              regex: ([^:]+)(?::\d+)?;(\d+)
              replacement: $1:$2
              target_label: __address__
            - source_labels: [__meta_kubernetes_namespace]
              action: replace
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              action: replace
              target_label: pod
            - source_labels: [__meta_kubernetes_pod_node_name]
              action: replace
              target_label: node
        - job_name: kube-state-metrics
          scrape_interval: 15s
          static_configs:
            - targets:
                - "load-testing-prometheus-kube-state-metrics.load-testing.svc.cluster.local:8080"
        - job_name: node-exporter
          scrape_interval: 15s
          static_configs:
            - targets:
                - "load-testing-prometheus-node-exporter.load-testing.svc.cluster.local:9100"

# -- Grafana: staging 설정 (PVC 크기는 축소 불가하므로 base와 동일하게 유지)
grafana:
  persistence:
    size: 5Gi
  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
