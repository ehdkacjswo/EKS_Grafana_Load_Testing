{{/*
  ConfigMaps for k6 test scripts.
  Each test type (smoke, load, stress, spike) gets its own ConfigMap.
  The shared library gets a separate ConfigMap.

  Scripts are referenced from values.yaml under the 'scripts' key.
  To add a new script:
    1. Place the .js file in load-testing-framework/charts/load-testing/scripts/<type>/
    2. Add the filename to scripts.<type> in values.yaml
    3. Run: helm upgrade load-testing ./load-testing-framework/charts/load-testing
*/}}

---
# Shared k6 library
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "load-testing.fullname" . }}-scripts-lib
  namespace: {{ include "load-testing.namespace" . }}
  labels:
    {{- include "load-testing.labels" . | nindent 4 }}
    app.kubernetes.io/component: k6-scripts
    script-type: lib
data:
  {{- range .Values.scripts.lib }}
  {{ . }}: |-
    {{ $.Files.Get (printf "scripts/lib/%s" .) | nindent 4 }}
  {{- end }}

{{- $types := list "smoke" "load" "stress" "spike" }}
{{- range $type := $types }}
{{- $scripts := index $.Values.scripts $type }}
{{- if $scripts }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "load-testing.fullname" $ }}-scripts-{{ $type }}
  namespace: {{ include "load-testing.namespace" $ }}
  labels:
    {{- include "load-testing.labels" $ | nindent 4 }}
    app.kubernetes.io/component: k6-scripts
    script-type: {{ $type }}
data:
  {{- range $scripts }}
  {{ . }}: |-
    {{ $.Files.Get (printf "scripts/%s/%s" $type .) | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
