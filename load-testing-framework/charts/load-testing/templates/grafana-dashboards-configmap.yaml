{{/*
  ConfigMap for Grafana dashboard provisioning via sidecar.
  The Grafana sidecar watches for ConfigMaps with the label
  grafana_dashboard=load-testing and mounts them as dashboard files.
*/}}
{{- if .Values.grafana.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "load-testing.fullname" . }}-dashboards-overview
  namespace: {{ include "load-testing.namespace" . }}
  labels:
    {{- include "load-testing.labels" . | nindent 4 }}
    grafana_dashboard: "load-testing"
  annotations:
    grafana_folder: "Load Testing"
data:
  k6-overview.json: |-
    {{ .Files.Get "dashboards/k6-overview.json" | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "load-testing.fullname" . }}-dashboards-detail
  namespace: {{ include "load-testing.namespace" . }}
  labels:
    {{- include "load-testing.labels" . | nindent 4 }}
    grafana_dashboard: "load-testing"
  annotations:
    grafana_folder: "Load Testing"
data:
  k6-test-detail.json: |-
    {{ .Files.Get "dashboards/k6-test-detail.json" | nindent 4 }}
{{- end }}
