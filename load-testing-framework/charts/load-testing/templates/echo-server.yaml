{{/*
  Echo Server — lightweight HTTP service with Prometheus metrics.
  Used as a default load-test target when no real application is available.
  Exposes http_requests_total (counter) and http_request_duration_seconds_bucket
  (histogram) on /metrics, which feeds the EKS Application dashboard.

  Enable/disable via .Values.echoServer.enabled
*/}}
{{- if .Values.echoServer.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-server
  namespace: {{ include "load-testing.namespace" . }}
  labels:
    {{- include "load-testing.labels" . | nindent 4 }}
    app.kubernetes.io/component: echo-server
spec:
  replicas: {{ .Values.echoServer.replicas | default 1 }}
  selector:
    matchLabels:
      app: echo-server
  template:
    metadata:
      labels:
        app: echo-server
        {{- include "load-testing.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.echoServer.port | default 8080 }}"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: echo-server
          image: "{{ .Values.echoServer.image.repository }}:{{ .Values.echoServer.image.tag }}"
          imagePullPolicy: {{ .Values.echoServer.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ .Values.echoServer.port | default 8080 }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            {{- toYaml .Values.echoServer.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: echo-server
  namespace: {{ include "load-testing.namespace" . }}
  labels:
    {{- include "load-testing.labels" . | nindent 4 }}
    app.kubernetes.io/component: echo-server
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: echo-server
{{- end }}
